<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            /* display: flex; */
            width: 100vw;
            height: 100vh;
            background-color:beige;
            border: 5px solid black;
            background: fixed;
            /* justify-content: center;
            align-items: center; */
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin: 10px;
            border: 3px solid yellow;
            animation-name: rightMovement;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            /* animation-delay: 2s;   */
            position: relative;
            /* animation-timing-function: cubic-bezier(0.68, -0.55, 0.27, 1.55); */
            animation-direction: alternate;
            /* animation-fill-mode: both; */
        }
        @keyframes rightMovement{
            from {
                top: 0;
                left: 0;
            }
            to{
                top: 0;
                left: 1320px;
            }
        }

        .box1{
            width: 350px;
            height: 80px;
            background-color: green;
            border-radius: 10px;
            margin: 10px;
            border: 3px solid yellow;
            position: relative;
            animation-name: leftMovement;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            
        }

        @keyframes leftMovement {
            from{
                top: 800px;
                left: 1320px ;
            }
            to{
                top:800px;
                left: 0;
            }
        }

        .circle{
            width: 100px;
            height: 100px;
            background-color: #008000;
            border-radius: 50px;
            margin: 10px;
            border: 3px solid yellow;
            position: relative;
            top: 30%;
            left: 40%;
            /* animation-name: circleMovement; */
            animation:  10s ease-in-out 0s infinite alternate-reverse none running circleMovement;
        }
        @keyframes circleMovement {
            0% {
                /* 0 % animation complete hui to yah pe hona chaite */
                top: 1%;
                left: 5%;
            }
            30% {
                top: 5%;
                left: 90%;  
            }
            60% {
                top: 70%;
                left: 10%;
            }
            100% {
                top: 75%;
                left: 90%;
            } 
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        
        <div class="circle"></div>
        <div class="box1"></div>
    </div>
</body>
</html>
