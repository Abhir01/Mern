    <!-- form3 -->


    <h1>Complex Form</h1>
    <form action="">
        <fieldset>
            <legend>Personal Information</legend>
            
            <label for="name">Name</label>
            <input type="text" name="" id="name">

            <label for="email">Email</label>
            <input type="email" id="email">

            <label for="Phone">Phone</label>
            <input type="tel" name="" id="Phone">

            <label for="date">Date of Birth</label>
            <input type="date" name="" id="date">

            <label for="">Gender</label>
            <input type="radio" name="gender" id="Male">
            <label for="Male">Male</label>
            <input type="radio" name="gender" id="Female">
            <label for="Female">Female</label>

            <label for="country">Country</label><br>
            <select name="ddl" id="country">
                <option value="none" selected>Select country</option>
                <option value="india">India</option>
                <option value="Us">Us</option>
                <option value="Africa">Africa</option>
                <!-- <option value="default">none</option> -->
            </select>
        </fieldset>

        <fieldset>
            <legend>
                <label for="address">Address Street</label>
                <input type="text" name="address" id="address">

                <label for="city">City</label>
                <input type="text" name="city" id="city">

                <label for="state">State</label>
                <input type="text" name="state" id="state">

                <label for="zip">Zip Code</label>
                <input type="text" name="zip" id="zip">
            </legend>
        </fieldset>

        <fieldset>
            <legend>Other Information</legend>
            <label for="ta">Comments</label>
            <textarea name="ta" id="ta" cols="75" rows="5"></textarea>
            <label for="btn">I agree to the terms of service</label>
            <input type="checkbox" name="btn" id="btn">
        </fieldset>

        <input type="submit" value="submit">
    </form>

</body>
