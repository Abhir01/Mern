<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 400px;
            height: 400px;
            border: 2px solid black;
            background-color: aqua;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto; 
            /* center horizontally */
            transition: all 3s linear 1s;
        }
        .box:hover{
            /* transform: rotate(360deg);
            transform: scale(2);
            transform: scale(0.5);
            transform: rotate(-45deg);
            transform: skew(45deg); */

            transform: translate(120px, 120px );    
        }
        p{
            font-size: 36px;
        }

        .container{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }


        
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <p>hello this is Abhi</p>
        </div>
    </div>
    <!-- <p>hello</p> -->
</body>
</html>
